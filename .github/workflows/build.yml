name: Build iOS_UEDumper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pin KittyMemory to compatible commit
        run: |
          cd deps/KittyMemory
          git checkout 99a3a3d

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz -o /tmp/sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C $HOME/theos/sdks/

      - name: Install build dependencies
        run: |
          brew install ldid xz

      - name: Build package
        run: |
          cd Tweak
          make clean package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper-deb
          path: Tweak/packages/*.deb
